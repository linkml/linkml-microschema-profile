---
id: https://w3id.org/linkml/linkml-microschema-profile/cluster_027
name: cluster_027_sdq_behavioral_emotional
description: |-
  Microschemas derived from CDE Cluster 027: SDQ Behavioral and Emotional Well-being Cluster
  Source: https://github.com/monarch-initiative/cde-clustering

prefixes:
  coms: https://w3id.org/linkml/linkml-microschema-profile/
  linkml: https://w3id.org/linkml/
  LOINC: https://loinc.org/
  OBA: http://purl.obolibrary.org/obo/OBA_
  OMOP: https://athena.ohdsi.org/search-terms/terms/

imports:
  - linkml:types
  - ../../linkml_microschema_profile

classes:

  #────────────────────────────────────────────────────────────────
  # SDQ Total Difficulties Score
  #────────────────────────────────────────────────────────────────
  # Aligned CDEs:
  #   - SDQ Total difficulties score (sum of all scales except prosocial)
  #   - LOINC:71962-4 "SDQ Total difficulties score"
  #────────────────────────────────────────────────────────────────

  SdqTotalDifficultiesScoreRecord:
    is_a: ClinicalMeasurementRecord
    description: >-
      Total difficulties score from the Strengths and Difficulties
      Questionnaire (SDQ), generated by summing scores from emotional,
      conduct, hyperactivity, and peer problem subscales (excluding
      prosocial scale). Range 0-40.
    rules:
      - preconditions:
          slot_conditions:
            measurement_type:
              any_of:
                - equals_string: LOINC:71962-4
            instrument:
              any_of:
                - equals_string: sdq
      - postconditions:
          slot_conditions:
            data_type:
              equals_string: integer
            measurement_value:
              range: integer
              minimum_value: 0
              maximum_value: 40

  #────────────────────────────────────────────────────────────────
  # SDQ Emotional Problems Score
  #────────────────────────────────────────────────────────────────
  # Aligned CDEs:
  #   - SDQ Emotional problem score
  #   - LOINC:71963-2 "SDQ Emotional problems score"
  #────────────────────────────────────────────────────────────────

  SdqEmotionalProblemsScoreRecord:
    is_a: ClinicalMeasurementRecord
    description: >-
      Emotional problems subscale score from the Strengths and
      Difficulties Questionnaire (SDQ). Range 0-10.
    rules:
      - preconditions:
          slot_conditions:
            measurement_type:
              any_of:
                - equals_string: LOINC:71963-2
            instrument:
              any_of:
                - equals_string: sdq
      - postconditions:
          slot_conditions:
            data_type:
              equals_string: integer
            measurement_value:
              range: integer
              minimum_value: 0
              maximum_value: 10

  #────────────────────────────────────────────────────────────────
  # SDQ Conduct Problems Score
  #────────────────────────────────────────────────────────────────
  # Aligned CDEs:
  #   - SDQ Conduct problem score
  #   - LOINC:71964-0 "SDQ Conduct problems score"
  #────────────────────────────────────────────────────────────────

  SdqConductProblemsScoreRecord:
    is_a: ClinicalMeasurementRecord
    description: >-
      Conduct problems subscale score from the Strengths and
      Difficulties Questionnaire (SDQ). Range 0-10.
    rules:
      - preconditions:
          slot_conditions:
            measurement_type:
              any_of:
                - equals_string: LOINC:71964-0
            instrument:
              any_of:
                - equals_string: sdq
      - postconditions:
          slot_conditions:
            data_type:
              equals_string: integer
            measurement_value:
              range: integer
              minimum_value: 0
              maximum_value: 10

  #────────────────────────────────────────────────────────────────
  # SDQ Hyperactivity Score
  #────────────────────────────────────────────────────────────────
  # Aligned CDEs:
  #   - SDQ Hyperactivity score
  #   - LOINC:71965-7 "SDQ Hyperactivity score"
  #────────────────────────────────────────────────────────────────

  SdqHyperactivityScoreRecord:
    is_a: ClinicalMeasurementRecord
    description: >-
      Hyperactivity/inattention subscale score from the Strengths and
      Difficulties Questionnaire (SDQ). Range 0-10.
    rules:
      - preconditions:
          slot_conditions:
            measurement_type:
              any_of:
                - equals_string: LOINC:71965-7
            instrument:
              any_of:
                - equals_string: sdq
      - postconditions:
          slot_conditions:
            data_type:
              equals_string: integer
            measurement_value:
              range: integer
              minimum_value: 0
              maximum_value: 10

  #────────────────────────────────────────────────────────────────
  # SDQ Peer Problems Score
  #────────────────────────────────────────────────────────────────
  # Aligned CDEs:
  #   - SDQ Peer problem score
  #   - LOINC:71966-5 "SDQ Peer problems score"
  #────────────────────────────────────────────────────────────────

  SdqPeerProblemsScoreRecord:
    is_a: ClinicalMeasurementRecord
    description: >-
      Peer problems subscale score from the Strengths and Difficulties
      Questionnaire (SDQ). Range 0-10.
    rules:
      - preconditions:
          slot_conditions:
            measurement_type:
              any_of:
                - equals_string: LOINC:71966-5
            instrument:
              any_of:
                - equals_string: sdq
      - postconditions:
          slot_conditions:
            data_type:
              equals_string: integer
            measurement_value:
              range: integer
              minimum_value: 0
              maximum_value: 10

  #────────────────────────────────────────────────────────────────
  # SDQ Prosocial Score
  #────────────────────────────────────────────────────────────────
  # Aligned CDEs:
  #   - SDQ Prosocial score
  #   - LOINC:71967-3 "SDQ Prosocial score"
  #────────────────────────────────────────────────────────────────

  SdqProsocialScoreRecord:
    is_a: ClinicalMeasurementRecord
    description: >-
      Prosocial behaviour subscale score from the Strengths and
      Difficulties Questionnaire (SDQ). Range 0-10. Unlike other
      subscales, lower scores indicate more concern.
    rules:
      - preconditions:
          slot_conditions:
            measurement_type:
              any_of:
                - equals_string: LOINC:71967-3
            instrument:
              any_of:
                - equals_string: sdq
      - postconditions:
          slot_conditions:
            data_type:
              equals_string: integer
            measurement_value:
              range: integer
              minimum_value: 0
              maximum_value: 10

  #────────────────────────────────────────────────────────────────
  # SDQ Impact Score
  #────────────────────────────────────────────────────────────────
  # Aligned CDEs:
  #   - SDQ Impact score
  #   - LOINC:71968-1 "SDQ Impact score"
  #────────────────────────────────────────────────────────────────

  SdqImpactScoreRecord:
    is_a: ClinicalMeasurementRecord
    description: >-
      Impact score from the Strengths and Difficulties Questionnaire
      (SDQ), reflecting overall distress and impairment. Range 0-10.
    rules:
      - preconditions:
          slot_conditions:
            measurement_type:
              any_of:
                - equals_string: LOINC:71968-1
            instrument:
              any_of:
                - equals_string: sdq
      - postconditions:
          slot_conditions:
            data_type:
              equals_string: integer
            measurement_value:
              range: integer
              minimum_value: 0
              maximum_value: 10

  #────────────────────────────────────────────────────────────────
  # SDQ Internalising Score
  #────────────────────────────────────────────────────────────────
  # Aligned CDEs:
  #   - SDQ Internalising score (emotional + peer problems)
  #────────────────────────────────────────────────────────────────

  SdqInternalisingScoreRecord:
    is_a: ClinicalMeasurementRecord
    description: >-
      Internalising score from the Strengths and Difficulties
      Questionnaire (SDQ), generated by summing the emotional and
      peer problems subscales. Range 0-20.
    rules:
      - preconditions:
          slot_conditions:
            measurement_type:
              any_of:
                - equals_string: LOINC:71969-9
            instrument:
              any_of:
                - equals_string: sdq
      - postconditions:
          slot_conditions:
            data_type:
              equals_string: integer
            measurement_value:
              range: integer
              minimum_value: 0
              maximum_value: 20

  #────────────────────────────────────────────────────────────────
  # SDQ Externalising Score
  #────────────────────────────────────────────────────────────────
  # Aligned CDEs:
  #   - SDQ Externalising score (conduct + hyperactivity)
  #────────────────────────────────────────────────────────────────

  SdqExternalisingScoreRecord:
    is_a: ClinicalMeasurementRecord
    description: >-
      Externalising score from the Strengths and Difficulties
      Questionnaire (SDQ), generated by summing the conduct and
      hyperactivity subscales. Range 0-20.
    rules:
      - preconditions:
          slot_conditions:
            measurement_type:
              any_of:
                - equals_string: LOINC:71970-7
            instrument:
              any_of:
                - equals_string: sdq
      - postconditions:
          slot_conditions:
            data_type:
              equals_string: integer
            measurement_value:
              range: integer
              minimum_value: 0
              maximum_value: 20
