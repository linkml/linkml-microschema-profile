---
id: https://w3id.org/linkml/linkml-microschema-profile/cluster_005
name: cluster_005_cognitive_development_composite
description: |-
  Microschemas derived from CDE Cluster 005: Cognitive Development Composite Cluster
  Source: https://github.com/monarch-initiative/cde-clustering

prefixes:
  coms: https://w3id.org/linkml/linkml-microschema-profile/
  linkml: https://w3id.org/linkml/
  LOINC: https://loinc.org/
  OBA: http://purl.obolibrary.org/obo/OBA_
  OMOP: https://athena.ohdsi.org/search-terms/terms/

imports:
  - linkml:types
  - ../../linkml_microschema_profile

classes:
  #────────────────────────────────────────────────────────────────
  # NIH Toolbox Cognition Total Composite
  #────────────────────────────────────────────────────────────────
  # Aligned CDEs:
  #   - Cognition total composite computed score (QJlc0DdT68)
  #   - Cognition total composite age adjusted scale score (QJoAvu66L)
  #   - Cognition total composite fully adjusted scale score (X1_jAwOTa8)
  #   - Cognition total composite unadjusted scale score (myZcCvd6TI)
  #   - Cognition total composite national age adjusted percentile (XyxiAv_TpI)
  #   - Cognition total composite raw score (Qy9AD_6p8)
  #────────────────────────────────────────────────────────────────

  NIHTBCognitionTotalCompositeRecord:
    is_a: ClinicalMeasurementRecord
    description: >-
      Total Composite score from the NIH Toolbox Cognitive Battery,
      combining both fluid and crystallized cognitive ability measures
      into a single overall cognitive function score.
    rules:
      - preconditions:
          slot_conditions:
            measurement_type:
              any_of:
                - equals_string: LOINC:71722-3
            instrument:
              any_of:
                - equals_string: nih_toolbox_cognitive_battery
      - postconditions:
          slot_conditions:
            data_type:
              equals_string: decimal
            measurement_value:
              range: decimal
              minimum_value: 0
              maximum_value: 200
            unit:
              any_of:
                - equals_string: "{score}"

  #────────────────────────────────────────────────────────────────
  # NIH Toolbox Cognition Fluid Composite
  #────────────────────────────────────────────────────────────────
  # Aligned CDEs:
  #   - Cognition fluid composite computed score (QJwAw_pp8)
  #   - Cognition fluid composite age adjusted scale score (myWD0D_pTI)
  #   - Cognition fluid composite fully adjusted scale score (XJd0DOapU)
  #   - Cognition fluid composite unadjusted scale score (mklwCP_pTL)
  #   - Cognition fluid composite national age adjusted percentile (XJMw0Pu66L)
  #   - Cognition fluid composite raw score (QJG80Pu6T8)
  #────────────────────────────────────────────────────────────────

  NIHTBCognitionFluidCompositeRecord:
    is_a: ClinicalMeasurementRecord
    description: >-
      Fluid Composite score from the NIH Toolbox Cognitive Battery,
      reflecting reasoning, processing speed, and working memory
      abilities that decline with age.
    rules:
      - preconditions:
          slot_conditions:
            measurement_type:
              any_of:
                - equals_string: LOINC:71723-1
            instrument:
              any_of:
                - equals_string: nih_toolbox_cognitive_battery
      - postconditions:
          slot_conditions:
            data_type:
              equals_string: decimal
            measurement_value:
              range: decimal
              minimum_value: 0
              maximum_value: 200
            unit:
              any_of:
                - equals_string: "{score}"

